          type: string
          format: uuid
        message_id:
          type: string
          format: uuid
        type:
          type: string
          maxLength: 32
        mime_type:
          type: string
          nullable: true
          maxLength: 128
        file_path:
          type: string
          nullable: true
          description: Server-side storage path or external URL
          maxLength: 512
        encrypted_blob:
          type: string
          format: uri
          nullable: true
        size_bytes:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
        width:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          nullable: true
