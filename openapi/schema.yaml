    PatchedProfileRequest:
      type: object
      description: |-
        Safe profile serializer for client-driven profile updates.
        Whitelisted writable fields: username, email, phone_number, biometric_enabled.
        Sensitive fields (email_verified, is_staff, is_superuser, user_password, related_devices, etc.)
        are intentionally excluded.
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        phone_number:
          type: string
          nullable: true
          maxLength: 15
        biometric_enabled:
          type: boolean
    Profile:
      type: object
      description: |-
        Safe profile serializer for client-driven profile updates.
        Whitelisted writable fields: username, email, phone_number, biometric_enabled.
        Sensitive fields (email_verified, is_staff, is_superuser, user_password, related_devices, etc.)
        are intentionally excluded.
      properties:
        user_id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
