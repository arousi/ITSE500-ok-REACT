openapi: 3.0.3
info:
  title: ITSE500 APIs Documentation
  version: 1.0.0
  description: Authentication, Chat, and User Management API
paths:
  /api/v1/auth_api/health/:
    get:
      operationId: v1_auth_api_health_retrieve
      description: Report server liveness with a simple JSON payload and 200 status.
      summary: Health check
      tags:
      - ops
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
          description: ''
  /api/v1/auth_api/login/:
    post:
      operationId: v1_auth_api_login_create
      description: |-
        Authenticate a user and return JWT tokens plus initial sync payload.
        Accepts identifier (email/username) and user_password/password. Returns 200
        with access/refresh tokens, conversations, and attachments on success.
        Returns 401 for invalid credentials, 403 if user is inactive/locked, or 400/500 otherwise.
      summary: Login with identifier + password
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
        '401':
          description: Invalid credentials
        '403':
          description: User locked
  /api/v1/auth_api/logout/:
    post:
      operationId: v1_auth_api_logout_create
      description: |-
        Invalidate the current session and blacklist the refresh token if supplied.
        Returns a 200 response with a brief message. Requires a valid JWT and authenticated user.
      summary: Logout (client discards tokens)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
          description: ''
  /api/v1/auth_api/oauth/result/{state_value}/:
    get:
      operationId: v1_auth_api_oauth_result_retrieve
      description: |-
        Fetch the stored OAuth result payload for the given state (one-time).
        Returns 202 if the result isn't ready yet, 410 if already retrieved, 404 if
        the state is unknown, and 200 with the payload on success.
      summary: Fetch OAuth result by state
      parameters:
      - in: path
        name: state_value
        schema:
          type: string
        description: State value used in OAuth
        required: true
      tags:
      - oauth
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthCallbackResponse'
          description: ''
        '202':
          description: Result not ready
        '404':
          description: Not found
        '410':
          description: Already retrieved
  /api/v1/auth_api/otp-login/:
    post:
      operationId: v1_auth_api_otp_login_create
      description: 'Deprecated: OTP-based login is disabled in this release. Always
        returns 410 Gone.'
      summary: Login with OTP (deprecated)
      tags:
      - auth
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '410':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeprecatedEndpointResponse'
          description: ''
  /api/v1/auth_api/register/:
    post:
      operationId: v1_auth_api_register_create
      description: Create a new account or reconcile existing identity; returns JWTs
        and initial sync.
      summary: Register account
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: ''
        '409':
          description: invalid credentials.
  /api/v1/auth_api/set-password-after-email-verify/:
    post:
      operationId: v1_auth_api_set_password_after_email_verify_create
      description: |-
        Set/reset the account password after email verification.

        Expects JSON body with:
        - email: string; must match the authenticated user's email
        - password: string; client-side sha256(raw)

        On success, stores a salted backend hash and returns 200 with a message.
        May return 400 if data is invalid or email not verified; 404 if user not found;
        401 if JWT is missing/invalid.
      summary: Set password after email verify
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordAfterEmailVerifyRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SetPasswordAfterEmailVerifyRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SetPasswordAfterEmailVerifyRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetPasswordAfterEmailVerifyResponse'
          description: ''
        '400':
          description: Invalid data or email not verified
        '401':
          description: Auth required
        '404':
          description: User not found
  /api/v1/auth_api/token/refresh/:
    post:
      operationId: v1_auth_api_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth_api/verify-email-pin/:
    post:
      operationId: v1_auth_api_verify_email_pin_create
      description: |-
        Verify the 5-digit email PIN for the authenticated user.

        Expects JSON body with:
        - email: string; must match the authenticated user's email
        - pin: string; 5-digit code

        Returns 200 with a success message on valid PIN; 400 for invalid/expired PIN;
        404 if the user is not found; 401 if JWT is missing/invalid.
      summary: Verify email PIN
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailPinVerifyRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailPinVerifyRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailPinVerifyRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailPinVerifyResponse'
          description: ''
        '400':
          description: Invalid PIN or expired
        '401':
          description: Auth required
        '404':
          description: User not found
  /api/v1/chat_api/conversations/:
    get:
      operationId: v1_chat_api_conversations_list
      description: List the caller's own conversations, or create a new one owned
        by the caller.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversationList'
          description: ''
    post:
      operationId: v1_chat_api_conversations_create
      description: List the caller's own conversations, or create a new one owned
        by the caller.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
  /api/v1/chat_api/conversations/{conversation_id}/:
    get:
      operationId: v1_chat_api_conversations_retrieve
      description: |-
        Retrieve/update/delete a conversation owned by the caller.

        Uses a user-scoped queryset so another user's conversation resolves to 404
        (never 403) -- this avoids leaking whether the resource exists at all.
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    put:
      operationId: v1_chat_api_conversations_update
      description: |-
        Retrieve/update/delete a conversation owned by the caller.

        Uses a user-scoped queryset so another user's conversation resolves to 404
        (never 403) -- this avoids leaking whether the resource exists at all.
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConversationRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    patch:
      operationId: v1_chat_api_conversations_partial_update
      description: |-
        Retrieve/update/delete a conversation owned by the caller.

        Uses a user-scoped queryset so another user's conversation resolves to 404
        (never 403) -- this avoids leaking whether the resource exists at all.
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedConversationRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
    delete:
      operationId: v1_chat_api_conversations_destroy
      description: |-
        Retrieve/update/delete a conversation owned by the caller.

        Uses a user-scoped queryset so another user's conversation resolves to 404
        (never 403) -- this avoids leaking whether the resource exists at all.
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/chat_api/conversations/{conversation_id}/messages/:
    get:
      operationId: v1_chat_api_conversations_messages_list
      description: |-
        List or create messages within a conversation owned by the caller.

        The parent conversation is resolved with a user-scoped lookup, so a missing
        OR non-owned conversation both yield 404 (covers the cross-user case without
        revealing existence of another user's conversation).
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMessageList'
          description: ''
    post:
      operationId: v1_chat_api_conversations_messages_create
      description: |-
        List or create messages within a conversation owned by the caller.

        The parent conversation is resolved with a user-scoped lookup, so a missing
        OR non-owned conversation both yield 404 (covers the cross-user case without
        revealing existence of another user's conversation).
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MessageWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MessageWriteRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWrite'
          description: ''
  /api/v1/chat_api/conversations/{conversation_id}/messages/{message_id}/attachments/:
    get:
      operationId: v1_chat_api_conversations_messages_attachments_list
      description: |-
        List or upload attachments belonging to a message owned by the caller.

        The parent message is resolved with a user-scoped lookup (through its
        conversation's owner), so a missing OR non-owned message/conversation both
        yield 404 -- never leaking existence of another user's data.

        Uses a dedicated `AttachmentUploadSerializer` for this endpoint only; the
        `user_mang.serializers.AttachmentSerializer` used by `UnifiedSyncView` is
        untouched.
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: message_id
        schema:
          type: string
          format: uuid
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttachmentUploadList'
          description: ''
    post:
      operationId: v1_chat_api_conversations_messages_attachments_create
      description: |-
        List or upload attachments belonging to a message owned by the caller.

        The parent message is resolved with a user-scoped lookup (through its
        conversation's owner), so a missing OR non-owned message/conversation both
        yield 404 -- never leaking existence of another user's data.

        Uses a dedicated `AttachmentUploadSerializer` for this endpoint only; the
        `user_mang.serializers.AttachmentSerializer` used by `UnifiedSyncView` is
        untouched.
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: message_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachmentUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttachmentUploadRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentUpload'
          description: ''
  /api/v1/crypto_api/umk/:
    get:
      operationId: v1_crypto_api_umk_retrieve
      description: 'Return the caller''s User Master Key metadata + base64 value,
        or {exists: false} if not yet provisioned.'
      summary: Get caller UMK
      tags:
      - crypto
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UMKGetResponse'
          description: ''
    post:
      operationId: v1_crypto_api_umk_create
      description: Provision the UMK once. Reject with 409 if already provisioned
        (rotation not yet supported).
      summary: Provision caller UMK
      tags:
      - crypto
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UMKProvisionRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UMKProvisionRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UMKProvisionRequestRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UMKProvisionResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UMKErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UMKErrorResponse'
          description: ''
  /api/v1/user_mang/me/:
    get:
      operationId: v1_user_mang_me_retrieve
      description: |-
        GET

        Returns a nested payload containing `profile` and/or `chat` depending on flags.

        Response shape (high level):
            {
                "user_id": <uuid>,
                "is_new": <bool>,
                "temp_id": <str|null>,
                "profile": { ... } ,          # present when profile=true or by default
                "chat": {                     # present when chat=true or by default
                    "conversations": [...],
                    "messages": [...],
                    "message_request": [...],
                    "message_response": [...],
                    "message_output": [...],
                    "attachments": [...]
                }
            }

        Notes / implementation details:
        - Serializers: when available the view uses `FullProfileSerializer` and `FullChatSerializer` to produce the
          canonical output. If serializers fail the view falls back to minimal manual assembly.
        - Attachments returned in `chat.attachments` always include a `user_id` field (derived from the related
          message) to make ownership explicit for clients.

        Example Request:
            GET /api/v1/unified-sync/?user_id=123e4567-e89b-12d3-a456-426614174000&profile=true&chat=true

        Example Response (simplified):
            {
                "user_id": "123e4567-e89b-12d3-a456-426614174000",
                "is_new": false,
                "temp_id": null,
                "profile": {
                    "user_id": "123e4567-e89b-12d3-a456-426614174000",
                    "username": "john_doe",
                    "email": "john@example.com",
                    "is_visitor": false,
                    "is_active": true,
                    "is_archived": false
                },
                "chat": {
                    "conversations": [
                        {
                            "conversation_id": "c1",
                            "title": "My Conversation",
                            "messages": [ {"message_id": "m1", "content": "Hello!"} ]
                        }
                    ],
                    "messages": [ {"message_id": "m1", "content": "Hello!"} ],
                    "attachments": [
                        {
                            "id": 1,
                            "type": "image",
                            "file_path": "/media/attachments/1.png",
                            "user_id": "123e4567-e89b-12d3-a456-426614174000"
                        }
                    ]
                }
            }
      summary: Unified sync (fetch profile/chat)
      parameters:
      - in: query
        name: allow_public_uuid
        schema:
          type: boolean
        description: Allow unauthenticated read by UUID for GET
      - in: query
        name: chat
        schema:
          type: boolean
        description: Include chat section
      - in: query
        name: device_id
        schema:
          type: string
        description: Associate device with user/visitor
      - in: query
        name: profile
        schema:
          type: boolean
        description: Include profile section
      - in: query
        name: temp_id
        schema:
          type: string
        description: Visitor temp identifier (issues short-lived tokens)
      - in: query
        name: user_id
        schema:
          type: string
        description: User UUID (GET only, when allow_public_uuid=true)
      tags:
      - sync
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedSyncGetResponse'
          description: ''
    post:
      operationId: v1_user_mang_me_create
      description: Upsert profile and chat model lists atomically; returns summary/errors
        and canonical payload.
      summary: Unified upsert (profile/chat)
      tags:
      - sync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedSyncPostRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UnifiedSyncPostRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UnifiedSyncPostRequestRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedSyncPostResponse'
          description: ''
        '400':
          description: Validation error
        '500':
          description: Transaction failed
    patch:
      operationId: v1_user_mang_me_partial_update
      description: Authenticated partial update for profile fields (me endpoint style).
      summary: Partial profile update
      tags:
      - sync
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedSyncPatchResponse'
          description: ''
        '400':
          description: Validation error
        '401':
          description: Auth required
    delete:
      operationId: v1_user_mang_me_destroy
      description: |-
        DELETE

        Delete or archive a user's profile and/or chat data.

        Important behavior changes:
            - The ``action`` parameter is now restricted to "delete" or "archive". Other values are rejected.
            - On any successful delete or archive operation this endpoint will always generate BOTH a CSV and a
              PDF export of the user's data.
            - Exports are saved under MEDIA_ROOT/exports/<user_id> and emailed to the user's verified address when
              available.
            - If the caller provides ``download_now`` (truthy: 1/true/yes) the view will zip the CSV+PDF and
              immediately return the zip file as a FileResponse. If ``download_now`` is falsy the files are kept on
              disk and the response will include URLs the client can use to download them.

        Parameters (body or query):
            - action: "delete" | "archive"  (required)
            - profile: true/false
            - chat: true/false
            - download_now: true/false or 1/0 — when true return a zip (csv+pdf) immediately; when false save and
              return URLs instead
            - reason: optional string for audit logs

        Returns (examples):

        Example Request (delete + return URLs):
            DELETE /api/v1/unified-sync/
            {
                "user_id": "123e4567-e89b-12d3-a456-426614174000",
                "action": "delete",
                "profile": true,
                "chat": true,
                "download_now": false
            }

        Example Response (delete, saved exports):
            HTTP 200
            {
                "message": "User and all related data deleted successfully",
                "deleted": { "attachments": 2, "messages": 5, "conversations": 1, "tokens": 1, "user": 1 },
                "export_urls": {
                    "csv": "https://example.com/media/exports/<user_id>/user_export_20250829123000.csv",
                    "pdf": "https://example.com/media/exports/<user_id>/user_export_20250829123000.pdf"
                },
                "profile": { /* FullProfileSerializer output or minimal fallback */ },
                "chat": { /* FullChatSerializer output or minimal fallback */ }
            }

        Example Request (archive + immediate download):
            DELETE /api/v1/unified-sync/
            {
                "user_id": "123e4567-e89b-12d3-a456-426614174000",
                "action": "archive",
                "profile": true,
                "download_now": true
            }

        Example Response (archive, immediate zip):
            HTTP 200
            (A FileResponse serving an attachment named "user_export_<user_id>.zip" containing both CSV and PDF)

        Notes:
            - Exporting and emailing are best-effort. Failures while creating or sending exports are logged and do
              not prevent the delete/archive from completing.
            - The response will include ``export_urls`` when files are saved and not directly returned.
      summary: Delete or archive user data
      parameters:
      - in: query
        name: action
        schema:
          type: string
        description: '''delete'' or ''archive'''
      - in: query
        name: chat
        schema:
          type: boolean
      - in: query
        name: download_now
        schema:
          type: boolean
        description: If true, returns a zip of CSV+PDF
      - in: query
        name: profile
        schema:
          type: boolean
      tags:
      - sync
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedSyncDeleteResponse'
          description: ''
        '400':
          description: Invalid action or request
        '401':
          description: Auth required
components:
