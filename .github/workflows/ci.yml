name: CI

# Shared convention across itse500-react / itse500-django / itse500-flutter:
#   trigger on push + PR to main, then: install -> lint -> test(+coverage) -> build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (react)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .js,.jsx --max-warnings=250
        continue-on-error: true

      - name: Test (+ coverage)
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          CI: false
          REACT_APP_API_BASE_URL: https://www.itse500-ok.ly
          REACT_APP_AUTH_BASE_URL: https://www.itse500-ok.ly

  api-drift:
    name: api (typed client)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate typed client from vendored schema
        run: npm run gen:api

      # Checks the committed client matches the VENDORED schema (openapi/schema.yaml),
      # not that the vendored schema matches the live backend — re-vendor separately.
      - name: Fail if committed generated client is stale
        run: git diff --exit-code src/api/schema.d.ts

      - name: Type-check the generated client
        run: npx tsc --noEmit -p tsconfig.json
